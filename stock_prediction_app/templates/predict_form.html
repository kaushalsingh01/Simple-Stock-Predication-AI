<!DOCTYPE html>
<html>

<head>
    <title>Stock Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <h1 class="mb-4">Stock Price Prediction</h1>

        <form action="/predict" method="POST" class="col-md-6">
            <div class="mb-3">
                <label for="stock_name" class="form-label">Select Stock:</label>
                <select class="form-select" id="stock_name" name="stock_name" required>
                    <option value="">-- Select a stock --</option>
                    {% for stock, ticker in available_stocks %}
                    <option value="{{ stock }}">{{ stock }} ({{ ticker }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="quantity" class="form-label">Quantity:</label>
                <input type="number" class="form-control" id="quantity" name="quantity" value="1" min="1" required>
            </div>

            <button type="submit" class="btn btn-primary">Predict Tomorrow's Price</button>
        </form>
    </div>
</body>

</html>
