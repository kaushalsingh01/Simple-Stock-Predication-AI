<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Select Stock to Test</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background-image: url("{{ url_for('static', filename='img/background.jpg') }}");
            min-height: 100vh;
            display: flex;
            background-size: contain;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
        }

        select,
        input[type="date"] {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border-radius: 6px;
            border: 1px solid #ccc;
            transition: border-color 0.3s ease;
        }

        select:focus,
        input:focus {
            border-color: #3498db;
            outline: none;
            box-shadow: 0 0 6px rgba(52, 152, 219, 0.2);
        }

        button {
            width: 100%;
            background-color: #3498db;
            color: #ffffff;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #2980b9;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px 20px;
            }

            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Select Stock and Date Range</h1>

        <form class="stock-form" action="/test_selected_stock" method="post">
            <div class="form-group">
                <label for="stock_name">Select Stock:</label>
                <select id="stock_name" name="stock_name" required>
                    {% for name, ticker in available_stocks %}
                    <option value="{{ name }}">{{ name }} ({{ ticker }})</option>
                    {% endfor %}
                </select>
                <input type="hidden" name="ticker" id="ticker" value="{{ available_stocks[0][1] }}">
            </div>

            <div class="form-group">
                <label for="start_date">Start Date:</label>
                <input type="date" id="start_date" name="start_date" value="{{ default_start }}" min="2010-01-01" required>
            </div>

            <div class="form-group">
                <label for="end_date">End Date:</label>
                <input type="date" id="end_date" name="end_date" value="{{ default_end }}" max="{{ today }}" required>
            </div>

            <button type="submit">Run Accuracy Test</button>
        </form>
        <button id="return_home">Home Screen</button>
    </div>

    <script>
        document.getElementById('stock_name').addEventListener('change', function () {
            const selectedOption = this.options[this.selectedIndex];
            const ticker = selectedOption.textContent.match(/\(([^)]+)\)/)[1];
            document.getElementById('ticker').value = ticker;
        });
        document.getElementById('return_home').addEventListener('click',function(e){
            document.location.href='/';
        })
    </script>
</body>

</html>
